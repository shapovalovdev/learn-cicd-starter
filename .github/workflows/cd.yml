name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
            go-version: "1.26.0"
      - name: Build
        run: ./scripts/buildprod.sh

      - name: Migrate database
        run: chmod +x ./scripts/migrateup.sh && ./scripts/migrateup.sh
      - name: Fake deploy
        run: chmod +x gcloud && ./gcloud builds submit